<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Review</title>
    <meta name="theme-color" content="#070710" />
    <meta
      name="description"
      content="Bet smarter than the guy next to you. Under Review is the AI tool for people who take their bets personally — sharp takes, real data, no fluff. Free to try."
    />
    <meta property="og:title" content="Under Review" />
    <meta
      property="og:description"
      content="Bet smarter than the guy next to you. For the ones who take it personally."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:description"
      content="Bet smarter than the guy next to you. For the ones who take it personally."
    />
    <style>
      /* Tokens for inline gradient/footer spans; pair with your landing stylesheet for layout/type. */
      :root {
        --text: #e8eaf0;
        --cyan: #0891b2;
        --mag: #e11d48;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1 class="hero-headline">
          <span class="line-1">BET SMARTER THAN</span>
          <span class="line-2">THE GUY NEXT TO YOU.</span>
        </h1>
        <p class="hero-sub">For the ones who take it personally.</p>
        <div class="hero-cta-group">
          <a href="https://www.under-review.app" class="btn-primary">PROVE IT →</a>
          <a href="#how" class="btn-secondary">SEE HOW IT WORKS</a>
        </div>
      </section>

      <section id="how"></section>

      <section class="footer-cta">
        <h2>
          <span style="color: var(--text)">THINK YOU'RE</span><br />
          <span
            style="
              background: linear-gradient(90deg, var(--cyan), var(--mag));
              -webkit-background-clip: text;
              background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >SHARPER THAN</span
          ><br />
          <span style="color: var(--text)">MOST?</span>
        </h2>
        <p>One question is all it takes to find out.</p>
        <a href="https://www.under-review.app" class="btn-primary">PROVE IT →</a>
      </section>
    </main>
  </body>
</html>
