<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF2D6B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070710;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C0E1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="taglineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF2D6B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#logoGrad)" />

  <!-- Logo - UnderReview -->
  <text
    x="600"
    y="240"
    font-family="Georgia, serif"
    font-size="96"
    font-weight="700"
    text-anchor="middle"
    fill="url(#logoGrad)"
    letter-spacing="2"
  >UnderReview</text>

  <!-- Tagline -->
  <text
    x="600"
    y="330"
    font-family="'Courier New', monospace"
    font-size="28"
    font-weight="400"
    text-anchor="middle"
    fill="#FFFFFF"
    letter-spacing="6"
  >SHARP TAKES &#183; REAL DATA</text>

  <!-- Sub-line -->
  <text
    x="600"
    y="395"
    font-family="'Courier New', monospace"
    font-size="18"
    font-weight="400"
    text-anchor="middle"
    fill="rgba(255,255,255,0.4)"
    letter-spacing="3"
  >AI BETTING INTELLIGENCE &#183; SIX SPORTS &#183; $9.99/MO</text>

  <!-- Sport pills -->
  <!-- NBA -->
  <rect x="224" y="460" width="90" height="28" rx="14" fill="rgba(255,107,0,0.15)" stroke="rgba(255,107,0,0.4)" stroke-width="1"/>
  <text x="269" y="479" font-family="'Courier New', monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#FF6B00" letter-spacing="1">NBA</text>

  <!-- NFL -->
  <rect x="330" y="460" width="90" height="28" rx="14" fill="rgba(74,144,217,0.15)" stroke="rgba(74,144,217,0.4)" stroke-width="1"/>
  <text x="375" y="479" font-family="'Courier New', monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#4A90D9" letter-spacing="1">NFL</text>

  <!-- TENNIS -->
  <rect x="436" y="460" width="90" height="28" rx="14" fill="rgba(255,230,0,0.15)" stroke="rgba(255,230,0,0.4)" stroke-width="1"/>
  <text x="481" y="479" font-family="'Courier New', monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#FFE600" letter-spacing="1">TENNIS</text>

  <!-- MLB -->
  <rect x="542" y="460" width="90" height="28" rx="14" fill="rgba(29,185,84,0.15)" stroke="rgba(29,185,84,0.4)" stroke-width="1"/>
  <text x="587" y="479" font-family="'Courier New', monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#1DB954" letter-spacing="1">MLB</text>

  <!-- GOLF -->
  <rect x="648" y="460" width="90" height="28" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="693" y="479" font-family="'Courier New', monospace" font-size="11" font-weight="600" text-anchor="middle" fill="rgba(255,255,255,0.6)" letter-spacing="1">GOLF</text>

  <!-- F1 -->
  <rect x="754" y="460" width="90" height="28" rx="14" fill="rgba(225,6,0,0.15)" stroke="rgba(225,6,0,0.4)" stroke-width="1"/>
  <text x="799" y="479" font-family="'Courier New', monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#E10600" letter-spacing="1">F1</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#logoGrad)" />
</svg>
