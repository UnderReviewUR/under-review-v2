name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - name: NBA Game 3 probe (offline board)
        run: node scripts/probe-nba-game3.mjs
      - run: npm run eval:wc-golden:handler
      - run: npm run verify:wc-outrights
      - name: WC prompt drift check
        run: node scripts/detect-wc-prompt-change.mjs HEAD~1
      - name: Live golden eval (when API key present)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            npm run eval:wc-golden:live
          else
            echo "ANTHROPIC_API_KEY not set — skipping live golden eval"
          fi
